<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Management System</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
        <h1>Create Account</h1>
<br><br>
        <form>
            <table>
                <tr>
                    <th>Name</th>
                    <td><input placeholder="Enter Name" type="text" id="name-input"></td>
                </tr>
                <tr>
                    <th>Age</th>
                    <td><input placeholder="Enter Age" type="number" id="age-input"></td>
                </tr>
                <tr>
                    <th>Phone</th>
                    <td><input placeholder="Enter Phone" type="number" id="phone-input"></td>
                </tr>
                <tr>
                    <th>Address</th>
                    <td><input placeholder="Enter Address" type="text" id="address-input"></td>
                </tr>
                <tr>
                    <th>Initial Deposit</th>
                    <td><input placeholder="Minimum 1000/-" type="number" id="deposit-input"></td>
                </tr>
            </table>            
        </form>
        <button id="create-account" onclick="createAccount(event)">Create Account</button>
        <div id="create-account-popup">
             <h2>Account Created Successfully!!!</h2>
             <h3>Your Account Number :  </h3>
             <a href="index.html"><button id="close-popup">CLOSE!!!</button></a>
        </div>
        
    </center>
    
</body>
</html>
